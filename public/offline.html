<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline · Flexter</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0a0a0f;
            color: #f5f5f8;
            font-family: system-ui, sans-serif;
            padding: 1.5rem;
        }
        .card {
            max-width: 24rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            background: rgba(255,255,255,.04);
        }
        h1 { margin: 0 0 .75rem; font-size: 1.5rem; }
        p { margin: 0; color: rgba(255,255,255,.65); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>You are offline</h1>
        <p>Flexter needs a connection to browse movies and shows. Reconnect and try again.</p>
    </div>
</body>
</html>
